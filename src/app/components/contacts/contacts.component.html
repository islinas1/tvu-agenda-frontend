<div class="contacts-page">
  <div class="contacts-card">
    <div class="top-banner">
      <div class="logos-box">
        <img src="LOGORADIO.png" alt="Logo Radio" class="logo logo-main">
        <img src="LOGO TVU.png" alt="Logo TVU" class="logo logo-main">
      </div>
      <div class="brand-text">
        <p class="brand-line">Radio Universitaria</p>
        <p class="brand-line">y Televisión Universitaria</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="title-block">
      <h1 class="title">AGENDA DE</h1>
      <h2 class="title title-strong">CONTACTOS</h2>
    </div>

    <div class="search-container">
      <mat-form-field appearance="outline" class="search-field soft-field" style="width: 100%;">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput placeholder="Buscar por nombre, institución o teléfono..." [(ngModel)]="searchQuery"
          (ngModelChange)="applyFilters()">
        <button *ngIf="searchQuery" mat-icon-button matSuffix (click)="clearSearch()">
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>
    </div>

    <div class="filters-block">
      <div class="filters-row">
        <button mat-stroked-button type="button" class="filter-button" [class.filter-active]="isFilterActive('name')"
          (click)="toggleFilter('name')">
          Nombre
        </button>
        <button mat-stroked-button type="button" class="filter-button"
          [class.filter-active]="isFilterActive('institution')" (click)="toggleFilter('institution')">
          Institución
        </button>
        <button mat-stroked-button type="button" class="filter-button"
          [class.filter-active]="isFilterActive('position')" (click)="toggleFilter('position')">
          Cargo
        </button>
      </div>
    </div>

    <div class="table-shell">
      <div class="table-watermark"></div>
      <div class="table-scroll">
        <table mat-table [dataSource]="filteredContacts" class="contacts-table">

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let contact" [class.inactive-text]="!contact.is_active">
              {{ contact.contact_name }}
              <span *ngIf="!contact.is_active" class="status-tag">Inactivo</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="institution">
            <th mat-header-cell *matHeaderCellDef>Institución</th>
            <td mat-cell *matCellDef="let contact">{{ contact.contact_institution || '-' }}</td>
          </ng-container>

          <ng-container matColumnDef="phones">
            <th mat-header-cell *matHeaderCellDef>Teléfonos</th>
            <td mat-cell *matCellDef="let contact">
              <div class="phone-list">
                <div *ngFor="let p of contact.phones" class="phone-item" [class.phone-inactive]="!p.is_active">
                  <span class="phone-number">{{ p.phone }}</span>
                  <span class="phone-date">{{ p.registration_date | date:'dd/MM/yy' }}</span>
                </div>
              </div>
            </td>
          </ng-container>

          <ng-container matColumnDef="position">
            <th mat-header-cell *matHeaderCellDef>Cargo</th>
            <td mat-cell *matCellDef="let contact">{{ contact.contact_position || '-' }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </div>
  </div>
</div>

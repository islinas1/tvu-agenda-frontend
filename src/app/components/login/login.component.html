<div class="login-page">
    <div class="login-card">
        <div class="logos-top logos-row">
            <img src="LOGORADIO.png" alt="TVU Logo 1" class="logo logo-main">
            <img src="LOGO TVU.png" alt="TVU Logo 2" class="logo logo-main">
        </div>

        <div class="divider"></div>

        <h3 class="title">AGENDA</h3>
        <p class="subtitle" *ngIf="!requirePassword">Ingresa tu C.I.</p>
        <p class="subtitle" *ngIf="requirePassword">Ingresa tu contraseña</p>

        <!-- Mensaje de error inline (en vez de alert feo) -->
        <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

        <mat-form-field appearance="outline" class="full-width">
            <input matInput type="text" [(ngModel)]="ci" placeholder="C.I."
                [disabled]="requirePassword">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" *ngIf="requirePassword">
            <input matInput id="passwordInput" type="password" [(ngModel)]="password"
                placeholder="Contraseña" (keyup.enter)="ingresar()">
        </mat-form-field>

        <button mat-raised-button color="primary" class="login-button" type="button"
            (click)="ingresar()" [disabled]="loading">
            {{ loading ? 'Verificando...' : 'Iniciar' }}
        </button>

        <!-- Boton para volver si ya se mostro el campo de contraseña -->
        <button mat-stroked-button class="back-button" type="button"
            *ngIf="requirePassword && !loading"
            (click)="requirePassword = false; password = ''; errorMessage = ''">
            Volver
        </button>
    </div>
</div>
